version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: loca-postgres
    environment:
      POSTGRES_USER: loca_admin
      POSTGRES_PASSWORD: loca_password
      POSTGRES_DB: loca_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: loca-minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: